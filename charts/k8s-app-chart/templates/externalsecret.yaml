{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "generic-service.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "generic-service.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName | default "gcp-secrets-manager" }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ include "generic-service.fullname" . }}
    creationPolicy: Owner
    {{- if .Values.externalSecrets.template }}
    template:
      engineVersion: v2
      data:
        {{- range $key, $value := .Values.externalSecrets.template }}
        {{ $key }}: {{ $value | quote }}
        {{- end }}
    {{- end }}
  data:
    {{- range .Values.externalSecrets.secrets }}
    - secretKey: {{ .secretKey }}
      remoteRef:
        key: {{ .remoteKey }}
        {{- if .property }}
        property: {{ .property }}
        {{- end }}
        {{- if .version }}
        version: {{ .version }}
        {{- end }}
    {{- end }}
{{- end }}
